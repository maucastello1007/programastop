  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

43,107,.5);\">\n          <img src=\"c389d0db-bc3f-4270-a4ba-366043912211\" alt=\"Família sorrindo e aprovando no consultório odontológico\" style=\"display:block;width:100%;height:auto;aspect-ratio:3/2;object-fit:cover;\">\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:-18px;left:-14px;background:var(--navy);color:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 20px 40px -16px rgba(26,43,107,.5);display:flex;align-items:center;gap:14px;z-index:2;\">\n          <svg viewBox=\"0 0 24 24\" width=\"30\" height=\"30\" fill=\"none\" stroke=\"#3FB6FF\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3.5l7.5 2.8v4.7c0 4.2-3 7.2-7.5 8.5-4.5-1.3-7.5-4.3-7.5-8.5V6.3L12 3.5z\"><\u002Fpath><path d=\"M8.5 11.8l2.3 2.3 4.5-4.5\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1;\">até 99%<\u002Fdiv><div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-top:3px;\">menos cárie e gengivite<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== STATS ===== -->\n  <section id=\"stop-stats\" style=\"background:var(--navy);position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(0,119,255,.18),transparent 50%),radial-gradient(circle at 85% 90%,rgba(63,182,255,.12),transparent 50%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;padding:54px 32px;position:relative;\">\n      <div style=\"text-align:center;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:34px;\">Um método validado, não uma promessa<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:32px;\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(40px,4.4vw,58px);line-height:1;color:#3FB6FF;\" data-counter=\"\" data-to=\"10\" data-pre=\"+\" data-suf=\" anos\">+10 anos<\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.72);font-size:14.5px;margin-top:10px;\">de história e evolução<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;border-left:1px solid rgba(255,255,255,.12);\">\n          <div style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(40px,4.4vw,58px);line-height:1;color:#3FB6FF;\" data-counter=\"\" data-to=\"24\" data-suf=\" estados\">24 estados<\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.72);font-size:14.5px;margin-top:10px;\">e 7 países atendidos<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;border-left:1px solid rgba(255,255,255,.12);\">\n          <div style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(40px,4.4vw,58px);line-height:1;color:#3FB6FF;\" data-counter=\"\" data-to=\"300\" data-pre=\"+\" data-suf=\" mil\">+300 mil<\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.72);font-size:14.5px;margin-top:10px;\">pacientes por ano<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;border-left:1px solid rgba(255,255,255,.12);\">\n          <div style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(40px,4.4vw,58px);line-height:1;color:#3FB6FF;\" data-counter=\"\" data-to=\"99\" data-pre=\"até \" data-suf=\"%\">até 99%<\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.72);font-size:14.5px;margin-top:10px;\">de redução de cárie e gengivite<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PROBLEMA (variantes) ===== -->\n  <section style=\"background:var(--white);padding:96px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px;\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:40px 48px;align-items:center;margin-bottom:44px;\">\n        <div>\n          <div style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--electric);margin-bottom:16px;\">O problema invisível<\u002Fdiv>\n          <h2 style=\"font-family:var(--font-display);font-weight:700;letter-spacing:-.03em;font-stretch:90%;line-height:1.04;font-size:clamp(30px,3.6vw,48px);color:var(--navy);margin:0 0 28px;\">Você escova os dentes todo dia. Então por que ainda aparecem problemas?<\u002Fh2>\n          <div style=\"display:flex;gap:8px;align-items:center;flex-wrap:wrap;\">\n            <span style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-right:4px;\">Layout<\u002Fspan>\n            <button onclick=\"{{ setPvA }}\" style=\"{{ pvAStyle }}\">Comparativo<\u002Fbutton>\n            <button onclick=\"{{ setPvB }}\" style=\"{{ pvBStyle }}\">Narrativa<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;display:flex;justify-content:center;align-items:center;\">\n          <img src=\"5e2da06f-917d-4f3e-a023-2ed261c04d3a\" alt=\"Closeup de mulher escovando os dentes\" style=\"width:100%;max-width:480px;aspect-ratio:4/3;object-fit:cover;display:block;border-radius:22px;border:1px solid var(--line);box-shadow:0 28px 50px -26px rgba(26,43,107,.4);\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Variante A: comparativo -->\n      <sc-if value=\"{{ pvA }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <p style=\"font-size:18px;color:var(--text);max-width:60ch;margin:0 0 36px;\">Porque existem <strong style=\"color:var(--navy);\">dois tipos de escovação<\u002Fstrong> — e provavelmente você só faz um deles.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;\">\n            <div style=\"background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:34px;\">\n              <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:8px;background:#fff;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg><\u002Fspan>Em casa<\u002Fdiv>\n              <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--navy);margin:0 0 12px;\">Escovação cosmética<\u002Fh3>\n              <p style=\"margin:0;color:var(--text);font-size:15.5px;\">A que você faz na correria. Limpa o que você vê — mas deixa para trás uma película de bactérias chamada <span style=\"background:linear-gradient(180deg,transparent 58%,var(--hl) 58%,var(--hl) 92%,transparent 92%);font-weight:600;color:var(--navy);\">biofilme aderido<\u002Fspan>, justamente onde o olho não alcança e a escova não chega. Com o tempo vira cárie, gengivite e perda óssea.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:var(--navy);border-radius:20px;padding:34px;color:#fff;\">\n              <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:8px;background:var(--electric);display:flex;align-items:center;justify-content:center;color:#fff;\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4.5 4.5L19 7.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>No dentista<\u002Fdiv>\n              <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:24px;margin:0 0 12px;\">Escovação profissional<\u002Fh3>\n              <p style=\"margin:0;color:rgba(255,255,255,.8);font-size:15.5px;\">Feita pelo dentista, com instrumentos específicos, remove completamente o biofilme de todas as regiões da boca — inclusive onde você nunca conseguiria chegar. E isso, segundo a ciência, <span style=\"color:#3FB6FF;font-weight:700;\">reduz em até 99%<\u002Fspan> as chances de cárie e doenças gengivais.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Variante B: narrativa -->\n      <sc-if value=\"{{ pvB }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:48px;align-items:center;\">\n          <div>\n            <p style=\"font-size:18px;color:var(--text);margin:0 0 18px;\">Porque existem <strong style=\"color:var(--navy);\">dois tipos de escovação<\u002Fstrong> — e provavelmente você só faz um deles.<\u002Fp>\n            <p style=\"font-size:16px;color:var(--text);margin:0 0 18px;\"><strong style=\"color:var(--navy);\">A escovação cosmética<\u002Fstrong> é a que você faz em casa, na correria. Ela limpa o que você vê, mas deixa para trás o <span style=\"background:linear-gradient(180deg,transparent 58%,var(--hl) 58%,var(--hl) 92%,transparent 92%);font-weight:600;color:var(--navy);\">biofilme aderido<\u002Fspan> — nas regiões que o olho não alcança e a escova não chega. Com o tempo, esse biofilme amadurece e provoca <strong style=\"color:var(--navy);\">cárie, gengivite e perda óssea.<\u002Fstrong><\u002Fp>\n            <p style=\"font-size:16px;color:var(--text);margin:0;\"><strong style=\"color:var(--navy);\">A escovação profissional<\u002Fstrong> remove completamente o biofilme de todas as regiões da boca. E isso, de acordo com a ciência, <span style=\"color:var(--electric);font-weight:700;\">reduz em até 99%<\u002Fspan> as chances de desenvolver cárie e doenças gengivais.<\u002Fp>\n          <\u002Fdiv>\n          <image-slot id=\"problema-biofilme\" shape=\"rounded\" radius=\"20\" fit=\"cover\" placeholder=\"Arraste: microscópio com biofilme, ou antes/depois dos dentes\" style=\"display:block;width:100%;height:clamp(340px,34vw,420px);border-radius:20px;border:1px solid var(--line);box-shadow:0 24px 50px -28px rgba(26,43,107,.4);background:#eef2f7;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- destaque escudo -->\n      <div style=\"margin-top:44px;display:flex;gap:20px;align-items:center;background:var(--electric-soft);border:1px solid #cfe2ff;border-left:5px solid var(--electric);border-radius:16px;padding:28px 32px;\">\n        <svg viewBox=\"0 0 24 24\" width=\"44\" height=\"44\" fill=\"none\" stroke=\"var(--electric)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\"><path d=\"M12 3l8 3v5c0 4.5-3.2 7.7-8 9-4.8-1.3-8-4.5-8-9V6l8-3z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <p style=\"margin:0;font-family:var(--font-display);font-weight:600;font-size:clamp(18px,2vw,23px);color:var(--navy);line-height:1.25;letter-spacing:-.01em;\">Um dente cariado nunca mais volta a ser o que era. Por isso, prevenir não é cuidado — é a decisão mais inteligente que existe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SOLUÇÃO — 2 PILARES ===== -->\n  <section style=\"background:var(--bg);padding:96px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px;\">\n      <div style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--electric);margin-bottom:16px;\">A solução<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-display);font-weight:700;letter-spacing:-.03em;font-stretch:90%;line-height:1.04;font-size:clamp(28px,3.4vw,44px);color:var(--navy);margin:0 0 40px;max-width:24ch;\">Para que seus dentes durem para sempre, o programa STOP trabalha em <span style=\"color:var(--electric);\">2 frentes:<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;\">\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:36px;transition:transform .15s,box-shadow .15s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -24px rgba(26,43,107,.3);\">\n          <div style=\"width:54px;height:54px;border-radius:14px;background:var(--electric);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\"><svg viewBox=\"0 0 24 24\" width=\"28\" height=\"28\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 3v5c0 4.5-3.2 7.7-8 9-4.8-1.3-8-4.5-8-9V6l8-3z\"><\u002Fpath><path d=\"M8.5 11.8l2.3 2.3 4.5-4.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--navy);margin:0 0 12px;\">Equilíbrio Biológico<\u002Fh3>\n          <p style=\"margin:0;color:var(--text);font-size:15.5px;\">Remoção profissional e periódica do biofilme, mantendo gengivas saudáveis e dentes protegidos — muito além do que qualquer escova faz em casa.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:20px;padding:36px;transition:transform .15s,box-shadow .15s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -24px rgba(26,43,107,.3);\">\n          <div style=\"width:54px;height:54px;border-radius:14px;background:var(--electric);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\"><svg viewBox=\"0 0 24 24\" width=\"28\" height=\"28\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.5 4a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13z\"><\u002Fpath><path d=\"M15.5 15.5l4.5 4.5\"><\u002Fpath><path d=\"M8 10.5c0-1.4 1.1-2.2 2.5-2.2s2.5.8 2.5 2.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--navy);margin:0 0 12px;\">Diagnóstico Precoce<\u002Fh3>\n          <p style=\"margin:0;color:var(--text);font-size:15.5px;\">Identificamos alterações no início, quando o tratamento ainda é simples, rápido e conservador — antes que um pequeno problema vire um grande gasto.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:32px 0 0;font-size:17px;color:var(--text);max-width:64ch;\">Juntos, esses dois pilares garantem que você <strong style=\"color:var(--navy);\">nunca mais seja pego de surpresa<\u002Fstrong> — nem pela cárie, nem pela conta do dentista.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== O QUE É O STOP ===== -->\n  <section style=\"background:var(--white);padding:96px 0;\">\n    <div style=\"max-width:880px;margin:0 auto;padding:0 32px;\">\n      <div style=\"border-left:4px solid var(--electric);padding-left:28px;\">\n        <div style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--electric);margin-bottom:16px;\">Em uma frase<\u002Fdiv>\n        <h2 style=\"font-family:var(--font-display);font-weight:700;letter-spacing:-.03em;font-stretch:90%;line-height:1.04;font-size:clamp(28px,3.4vw,44px);color:var(--navy);margin:0 0 26px;\">O que é o Programa STOP?<\u002Fh2>\n        <p style=\"font-size:17.5px;color:var(--text);margin:0 0 18px;\">O STOP é o <strong style=\"color:var(--navy);\">primeiro sistema de prevenção odontológica personalizado<\u002Fstrong> desenvolvido para todos os tipos de pacientes — de crianças até idosos, de quem nunca teve cárie até quem já fez implante, lente de contato dental ou harmonização facial.<\u002Fp>\n        <p style=\"font-size:17.5px;color:var(--text);margin:0;\">Não é um plano odontológico. Não é uma consulta avulsa. É um <strong style=\"color:var(--navy);\">acompanhamento contínuo e inteligente<\u002Fstrong>, onde o seu dentista monitora sua saúde bucal periodicamente, age antes que os problemas apareçam e, se aparecerem, os resolve no início — quando são pequenos, rápidos e baratos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;text-align:center;background:var(--bg);border-radius:20px;padding:40px;\">\n        <div style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(26px,3vw,38px);color:var(--navy);letter-spacing:-.02em;\">Paciente perto é <span style=\"color:var(--electric);\">paciente seguro.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:16px;color:var(--text);margin-top:12px;\">E seguro significa: sem surpresas, sem medo, sem gasto inesperado.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== BENEFÍCIOS ===== -->\n  <section id=\"beneficios\" style=\"background:var(--bg);padding:96px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px;\">\n      <div style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--electric);margin-bottom:16px;\">Benefícios<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-display);font-weight:700;letter-spacing:-.03em;font-stretch:90%;line-height:1.04;font-size:clamp(28px,3.4vw,44px);color:var(--navy);margin:0 0 44px;\">O que muda na sua vida com o STOP:<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:20px;\">\n        <sc-for list=\"{{ benefits }}\" as=\"b\" hint-placeholder-count=\"8\">\n          <article style=\"background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;display:flex;flex-d );\n        const step = (now) => {\n          const p = Math.min(1, (now - t0) / dur);\n          const e = 1 - Math.pow(1 - p, 3);\n          el.textContent = pre + Math.round(e * to).toLocaleString('pt-BR') + suf;\n          if (p < 1) requestAnimationFrame(step);\n        };\n        requestAnimationFrame(step);\n      });\n    };\n    if (band && 'IntersectionObserver' in window) {\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach((en) => { if (en.isIntersecting) run(); });\n      }, { threshold: 0.4 });\n      io.observe(band);\n    } else { run(); }\n  }\n\n  seg(on) {\n    const base = \"padding:8px 16px;border-radius:999px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;\";\n    return on\n      ? base + \"border:1.5px solid var(--electric);background:var(--electric);color:#fff;\"\n      : base + \"border:1.5px solid var(--line);background:#fff;color:var(--navy);\";\n  }\n\n  renderVals() {\n    const ticker = [\n      \"+10 anos de história\", \"24 estados\", \"7 países atendidos\", \"+300 mil pacientes/ano\",\n      \"até 99% menos cárie\", \"sem boleto surpresa\", \"prevenção inteligente\",\n    ];\n    return {\n      tickerSet: [...ticker, ...ticker].map((label, id) => ({ label, id })),\n      niches: [\"Clássico\", \"Kids\", \"Estética\", \"Ortodônticos\", \"Implantados\", \"Sênior\", \"Periodontal\", \"Alto Risco\"].map((label, id) => ({ label, id })),\n      pvA: this.state.pv === 'A', pvB: this.state.pv === 'B',\n      cvA: this.state.cv === 'A', cvB: this.state.cv === 'B',\n      setPvA: () => this.setState({ pv: 'A' }), setPvB: () => this.setState({ pv: 'B' }),\n      setCvA: () => this.setState({ cv: 'A' }), setCvB: () => this.setState({ cv: 'B' }),\n      pvAStyle: this.seg(this.state.pv === 'A'), pvBStyle: this.seg(this.state.pv === 'B'),\n      cvAStyle: this.seg(this.state.cv === 'A'), cvBStyle: this.seg(this.state.cv === '
